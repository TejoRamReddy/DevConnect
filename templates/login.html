<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | DevConnect</title>
</head>
<body style="margin:0; background:#0b0f1a; color:#e2e8f0; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; align-items:center; justify-content:center;">
    <div style="background:#161b2c; padding:50px; border-radius:24px; border:1px solid #2d3748; width:100%; max-width:420px; text-align:center; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <h2 style="font-size:2.2rem; margin:0 0 10px 0; color:#fff;">Login 🔐</h2>
        <p style="color:#64748b; margin-bottom:35px; font-size:1rem;">Access your workspace</p>

        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required style="width:100%; padding:15px; margin-bottom:15px; background:#0f172a; border:1px solid #2d3748; color:#fff; border-radius:12px; box-sizing:border-box;">
            <input type="password" name="password" placeholder="Password" required style="width:100%; padding:15px; margin-bottom:25px; background:#0f172a; border:1px solid #2d3748; color:#fff; border-radius:12px; box-sizing:border-box;">
            <button type="submit" style="width:100%; background:#38bdf8; color:#0b0f1a; padding:16px; border-radius:12px; border:none; font-weight:800; cursor:pointer; font-size:1.1rem;">Access Account</button>
        </form>
        
        <p style="margin-top:30px; font-size:0.95rem; color:#94a3b8;">
            New here? <a href="/register" style="color:#38bdf8; text-decoration:none; font-weight:700;">Create Account</a>
        </p>
    </div>
</body>
</html>
