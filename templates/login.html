<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevConnect</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-container {
            width: 100%;
            max-width: 460px;
            padding: 50px 40px;
            background: #161b26;
            border-radius: 24px;
            border: 1px solid #242b3d;
            box-sizing: border-box;
            text-align: center;
        }
        .login-container h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #637393;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 40px;
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 15px;
            color: #8a99ad;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #242b3d;
            border-radius: 12px;
            background: #0f1422;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #38bdf8;
            outline: none;
        }
        .form-group input::placeholder { color: #475569; }
        .btn-blue {
            width: 100%;
            padding: 14px;
            background-color: #38bdf8;
            color: #0f1422;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
            transition: background-color 0.2s;
        }
        .btn-blue:hover { background-color: #0ea5e9; }
        .error-msg {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            text-align: center;
            font-size: 14px;
        }
        .success-msg {
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            text-align: center;
            font-size: 14px;
        }
        p.footer-text {
            margin-top: 32px;
            font-size: 15px;
            color: #637393;
        }
        p.footer-text a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        p.footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login to DevConnect <span>🚀</span></h2>
        <p class="subtitle">Welcome back to the developer network</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="{{ 'success-msg' if 'created' in msg.lower() else 'error-msg' }}">
                {{ '✅' if 'created' in msg.lower() else '⚠️' }} {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" minlength="3" maxlength="80" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" minlength="6" required>
            </div>
            <button type="submit" class="btn-blue">Login Now</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</body>
</html>
